<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TruthSpace - Article Explorer</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap" rel="stylesheet">
  <style>
    .logo-font {
      font-family: 'Orbitron', sans-serif;
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body class="bg-gradient-to-br from-gray-900 via-blue-900 to-black text-white min-h-screen p-6">
  <header class="text-center mb-10">
    <h1 class="text-4xl sm:text-5xl font-bold text-blue-400 logo-font tracking-wider">TruthSpace</h1>
    <p class="mt-2 text-lg text-gray-300">Choose a topic or enter a URL to analyse media narratives</p>
  </header>

  <main class="max-w-3xl mx-auto">
    <!-- Topic Selector -->
    <section class="mb-10">
      <label for="topicSelect" class="block text-lg font-semibold text-blue-300 mb-2">Select Topic:</label>
      <select id="topicSelect" class="w-full p-2 rounded-md bg-gray-800 text-white">
        <option value="immigration" selected>Immigration</option>
        <option value="climate" disabled>Climate Change (Coming Soon)</option>
        <option value="elections" disabled>Elections (Coming Soon)</option>
        <option value="tech" disabled>Tech & AI (Coming Soon)</option>
      </select>
    </section>

    <!-- Recent Articles List -->
    <section class="mb-10">
      <h2 class="text-xl font-semibold text-blue-300 mb-2">Articles by Source</h2>
      <div id="articlesBySource" class="space-y-4">
        <!-- Grouped sources and articles appear here -->
      </div>
    </section>

    <!-- Manual URL Input -->
    <section class="mb-10">
      <label for="urlInput" class="block text-lg font-semibold text-blue-300 mb-2">Analyse New Article (Paste URL):</label>
      <div class="flex gap-2">
        <input id="urlInput" type="text" class="flex-grow p-2 rounded-md bg-gray-800 text-white" placeholder="https://..." />
        <button onclick="submitURL()" class="px-4 py-2 bg-blue-500 hover:bg-blue-600 rounded-md text-white">Go</button>
      </div>
    </section>
  </main>

  <script>
    async function loadImmigrationArticles() {
      try {
        const res = await fetch('articles.json');
        const articles = await res.json();
        const container = document.getElementById("articlesBySource");
        container.innerHTML = "";

        // Group articles by source
        const grouped = {};
        articles.forEach(article => {
          const source = article.source || "Unknown";
          if (!grouped[source]) grouped[source] = [];
          grouped[source].push(article);
        });

        // Render each group
        for (const source in grouped) {
          const section = document.createElement("div");

          const header = document.createElement("button");
          header.textContent = `${source} (${grouped[source].length})`;
          header.className = "w-full text-left bg-gray-800 text-blue-200 font-semibold py-2 px-4 rounded hover:bg-gray-700 focus:outline-none";
          header.onclick = () => {
            const list = section.querySelector("ul");
            list.classList.toggle("hidden");
          };

          const list = document.createElement("ul");
          list.className = "list-disc ml-6 mt-2 text-gray-200 hidden";
          grouped[source].forEach(article => {
            const li = document.createElement("li");
            li.innerHTML = `
                <div class="flex flex-wrap items-center gap-2">
                <a href="${article.url}" target="_blank" class="text-blue-400 hover:underline">${article.title}</a>
                <a href="ts_metricexample.html?id=${article.id}" target="_blank" class="bg-purple-700 text-sm px-2 py-1 rounded hover:bg-purple-800 text-white">Wiki</a>
                </div>
            `;
            list.appendChild(li);
            });


          section.appendChild(header);
          section.appendChild(list);
          container.appendChild(section);
        }
      } catch (err) {
        console.error("Error loading articles:", err);
        document.getElementById("articlesBySource").innerHTML = "<p class='text-red-400'>Failed to load articles.</p>";
      }
    }

    function submitURL() {
      const url = document.getElementById("urlInput").value;
      if (url) {
        alert("Article analysis for: " + url);
        // In future: Send to backend
      }
    }

    document.getElementById("topicSelect").addEventListener("change", (e) => {
      const topic = e.target.value;
      if (topic === "immigration") {
        loadImmigrationArticles();
      } else {
        document.getElementById("articlesBySource").innerHTML =
          `<p class="text-yellow-400">This topic is coming soon!</p>`;
      }
    });

    // Initial load
    loadImmigrationArticles();
  </script>
</body>
</html>
